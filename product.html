<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Artículo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="robots" content="noindex">
</head>

<body>
    <header>
        <h1><a href="index.html" style="color: inherit; text-decoration: none;">Catálogo de Artículos</a></h1>
        <p>Detalles del producto</p>
    </header>

    <main class="product-detail-main">
        <a href="index.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Volver al catálogo

        <div id="loading" class="no-results">Cargando producto...</div>
        <div id="product-container" class="product-detail-container" style="display: none;">
            <!-- Renderizado dinámico -->
        </div>
    </main>

    <script src="product.js"></script>
